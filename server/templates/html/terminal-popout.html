<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terminal - Popout</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
      background: #1e1e1e;
      color: #d4d4d4;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .popout-header {
      background: #252526;
      border-bottom: 1px solid #3e3e42;
      padding: 8px 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .popout-title {
      font-size: 14px;
      color: #cccccc;
    }
    .popout-close {
      background: transparent;
      border: none;
      color: #cccccc;
      cursor: pointer;
      padding: 4px 8px;
      font-size: 14px;
      border-radius: 3px;
    }
    .popout-close:hover {
      color: #ffffff;
      background: #2a2d2e;
    }
    .terminal-tabs {
      display: flex;
      gap: 4px;
    }
    .terminal-tab {
      background: transparent;
      border: none;
      color: #858585;
      cursor: pointer;
      padding: 4px 12px;
      font-size: 12px;
      border-radius: 3px;
      transition: all 0.2s;
    }
    .terminal-tab:hover {
      background: #2a2d2e;
      color: #cccccc;
    }
    .terminal-tab.active {
      background: #0e639c;
      color: #ffffff;
    }
    .terminal-content {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .terminal-tab-content {
      display: none;
      flex: 1;
      flex-direction: column;
      overflow: hidden;
    }
    .terminal-tab-content.active {
      display: flex;
    }
    .terminal-output {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      font-size: 13px;
      font-family: 'Consolas', 'Monaco', monospace;
      background: #1e1e1e;
      color: #d4d4d4;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .terminal-input-container {
      display: flex;
      align-items: center;
      padding: 8px 10px;
      background: #252526;
      border-top: 1px solid #3e3e42;
      gap: 8px;
    }
    .terminal-prompt {
      color: #4ec9b0;
      font-size: 13px;
    }
    .terminal-input {
      flex: 1;
      background: transparent;
      border: none;
      color: #d4d4d4;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 13px;
      outline: none;
    }
    .terminal-input::placeholder {
      color: #858585;
    }
  </style>
</head>
<body>
  <div class="popout-header">
    <div class="popout-title">Terminal - Popout</div>
    <div style="display: flex; align-items: center; gap: 8px;">
      <div class="terminal-tabs">
        <button class="terminal-tab active" data-tab="client">Client</button>
        <button class="terminal-tab" data-tab="server">Server</button>
        <button class="terminal-tab" data-tab="powershell">PowerShell</button>
        <button class="terminal-tab" data-tab="log">Log</button>
      </div>
      <button class="popout-close" id="closePopout">✕ Close</button>
    </div>
  </div>
  <div class="terminal-content">
    <div class="terminal-tab-content active" id="terminalClient">
      <div class="terminal-output" id="terminalClientOutput"></div>
      <div class="terminal-input-container">
        <span class="terminal-prompt">></span>
        <input type="text" class="terminal-input" id="terminalClientInput" placeholder="Type JavaScript commands...">
      </div>
    </div>
    <div class="terminal-tab-content" id="terminalServer">
      <div class="terminal-output" id="terminalServerOutput"></div>
    </div>
    <div class="terminal-tab-content" id="terminalPowerShell">
      <div class="terminal-output" id="terminalPowerShellOutput"></div>
      <div class="terminal-input-container">
        <span class="terminal-prompt">PS></span>
        <input type="text" class="terminal-input" id="terminalPowerShellInput" placeholder="Type PowerShell commands...">
      </div>
    </div>
    <div class="terminal-tab-content" id="terminalLog">
      <div class="terminal-output" id="terminalLogOutput"></div>
      <div class="terminal-input-container">
        <span class="terminal-prompt">></span>
        <input type="text" class="terminal-input" id="terminalLogInput" placeholder="Execute code in preview context...">
      </div>
    </div>
  </div>
  <script>
    // BroadcastChannel for cross-window communication
    const channel = new BroadcastChannel('preview-sync');
    
    let activeTab = 'client';
    let ws = null;
    
    // Tab switching
    document.querySelectorAll('.terminal-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        const tabName = tab.dataset.tab;
        switchTab(tabName);
      });
    });
    
    function switchTab(tabName) {
      activeTab = tabName;
      document.querySelectorAll('.terminal-tab').forEach(t => {
        t.classList.toggle('active', t.dataset.tab === tabName);
      });
      // Handle tab name capitalization correctly for content ID
      let contentId = '';
      if (tabName === 'powershell') {
        contentId = 'terminalPowerShell';
      } else {
        contentId = `terminal${tabName.charAt(0).toUpperCase() + tabName.slice(1)}`;
      }
      document.querySelectorAll('.terminal-tab-content').forEach(c => {
        c.classList.toggle('active', c.id === contentId);
      });
    }
    
    // Listen for terminal updates from main window
    channel.addEventListener('message', (event) => {
      if (event.data.type === 'terminal-output') {
        const { tab, output, append } = event.data;
        // Handle tab name capitalization correctly
        let tabName = tab;
        if (tab === 'powershell') {
          tabName = 'PowerShell';
        } else {
          tabName = tab.charAt(0).toUpperCase() + tab.slice(1);
        }
        const outputEl = document.getElementById(`terminal${tabName}Output`);
        if (outputEl) {
          if (append) {
            outputEl.textContent += output;
          } else {
            outputEl.textContent = output;
          }
          outputEl.scrollTop = outputEl.scrollHeight;
        }
      } else if (event.data.type === 'terminal-clear') {
        const { tab } = event.data;
        // Handle tab name capitalization correctly
        let tabName = tab;
        if (tab === 'powershell') {
          tabName = 'PowerShell';
        } else {
          tabName = tab.charAt(0).toUpperCase() + tab.slice(1);
        }
        const outputEl = document.getElementById(`terminal${tabName}Output`);
        if (outputEl) {
          outputEl.textContent = '';
        }
      }
    });
    
    // Setup WebSocket for server logs
    function setupWebSocket() {
      const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      const wsUrl = protocol + '//' + window.location.host;
      ws = new WebSocket(wsUrl);
      
      const serverOutput = document.getElementById('terminalServerOutput');
      
      ws.onopen = () => {
        console.log('Terminal popout WebSocket connected');
      };
      
      ws.onclose = () => {
        console.log('Terminal popout WebSocket disconnected - Reconnecting...');
        setTimeout(setupWebSocket, 2000);
      };
      
      ws.onerror = (error) => {
        console.error('Terminal popout WebSocket error:', error);
      };
      
      ws.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data);
          if (data.type === 'log' && serverOutput) {
            serverOutput.textContent += data.message + '\n';
            serverOutput.scrollTop = serverOutput.scrollHeight;
          }
        } catch (err) {
          // Ignore non-JSON messages
        }
      };
    }
    
    // Terminal input handlers
    const clientInput = document.getElementById('terminalClientInput');
    if (clientInput) {
      clientInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          const command = clientInput.value.trim();
          if (command) {
            // Send command to main window for execution
            channel.postMessage({
              type: 'terminal-command',
              tab: 'client',
              command: command
            });
            clientInput.value = '';
          }
        }
      });
    }
    
    const powershellInput = document.getElementById('terminalPowerShellInput');
    if (powershellInput) {
      powershellInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          const command = powershellInput.value.trim();
          if (command) {
            channel.postMessage({
              type: 'terminal-command',
              tab: 'powershell',
              command: command
            });
            powershellInput.value = '';
          }
        }
      });
    }
    
    const logInput = document.getElementById('terminalLogInput');
    if (logInput) {
      logInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          const command = logInput.value.trim();
          if (command) {
            channel.postMessage({
              type: 'terminal-command',
              tab: 'log',
              command: command
            });
            logInput.value = '';
          }
        }
      });
    }
    
    // Close button
    document.getElementById('closePopout').addEventListener('click', () => {
      window.close();
    });
    
    // Handle window close
    window.addEventListener('beforeunload', () => {
      if (ws) ws.close();
      channel.postMessage({
        type: 'popout-closed',
        popoutType: 'terminal'
      });
    });
    
    // Initial WebSocket connection
    setupWebSocket();
  </script>
</body>
</html>
