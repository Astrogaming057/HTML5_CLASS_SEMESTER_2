<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 — Jurassic Jungle Source Code Archive</title>
  <style>
    :root {
      --bg: #0c1118;
      --panel: #141a24;
      --border: #243044;
      --text: #e6edf3;
      --muted: #8b9cb3;
      --accent: #58a6ff;
      --dim: rgba(88, 166, 255, 0.12);
    }
    * { box-sizing: border-box; }
    html { color-scheme: dark; height: 100%; }
    body {
      margin: 0;
      min-height: 100%;
      font-family: ui-sans-serif, system-ui, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 0.65rem 1rem;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
    }
    header h1 {
      margin: 0;
      font-size: 1rem;
      font-weight: 600;
    }
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .card {
      max-width: 26rem;
      width: 100%;
      padding: 1.75rem 1.5rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: rgba(20, 26, 36, 0.65);
      text-align: center;
    }
    .code {
      font-size: 3rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.02em;
      line-height: 1.1;
      margin-bottom: 0.35rem;
    }
    .card h2 {
      margin: 0 0 0.5rem;
      font-size: 1.1rem;
      font-weight: 600;
    }
    .card p {
      margin: 0 0 1.25rem;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.5;
    }
    a.home {
      display: inline-block;
      padding: 0.45rem 1rem;
      border-radius: 6px;
      border: 1px solid var(--accent);
      background: var(--dim);
      color: var(--accent);
      font-weight: 600;
      text-decoration: none;
      font-size: 0.9rem;
    }
    a.home:hover {
      background: rgba(88, 166, 255, 0.22);
      color: var(--text);
    }
  </style>
</head>
<body>
  <header>
    <h1>🦖 Jurassic Jungle Source Code Archive</h1>
  </header>
  <main>
    <div class="card">
      <div class="code">404</div>
      <h2>Page not found</h2>
      <p>That URL isn’t part of this archive. Head back to the file tree or check the path.</p>
      <a class="home" href="./index.html">Back to archive</a>
    </div>
  </main>
</body>
</html>
