<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Jurassic Jungle by Astro's Lounge has been discontinued.">
    <title>JurassicJungle | Discontinued · v13</title>
    <style>
        *{box-sizing:border-box} body{margin:0;min-height:100vh;background:#0d1117;color:#e6edf3;font-family:Segoe UI,system-ui,sans-serif;display:flex;align-items:center;justify-content:center;padding:40px 20px}
        .wrap{max-width:720px;width:100%}
        .head{text-align:center;padding-bottom:24px;margin-bottom:24px;border-bottom:1px solid #30363d}
        .eyebrow{margin:0;font-size:.7rem;letter-spacing:.22em;text-transform:uppercase;color:#8b949e}
        h1{margin:10px 0 0;font-size:clamp(1.5rem,3.5vw,2rem);font-weight:700}
        .brand{margin:14px 0 0;font-size:1.05rem;color:#58a6ff;font-weight:600}
        .byline{margin:6px 0 0;font-size:.9rem;color:#8b949e}
        .msg{margin:18px 0 0;font-size:.98rem}
        .links{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:24px}
        .links a{display:flex;flex-direction:column;justify-content:center;min-height:120px;padding:20px;border-radius:12px;border:1px solid #30363d;background:#161b22;color:#58a6ff;text-decoration:none;font-weight:700;font-size:1rem;transition:.15s;text-align:center}
        .links a:hover{border-color:#58a6ff;background:#1c2128}
        .host{margin-top:10px;font-size:.78rem;font-weight:500;color:#8b949e;font-family:ui-monospace,monospace;word-break:break-all}
        @media(max-width:520px){.links{grid-template-columns:1fr}}
    </style>
</head>
<body>
    <main class="wrap">
        <header class="head">
            <p class="eyebrow">Notice</p>
            <h1>Service discontinued</h1>
            <p class="brand">Jurassic Jungle</p>
            <p class="byline">by Astro's Lounge — gaming community</p>
            <p class="msg">This service has been discontinued.</p>
        </header>
        <nav class="links" aria-label="Related sites">
            <a href="https://farewell.jurassicjungle.gg/" rel="noopener noreferrer">Farewell<span class="host">farewell.jurassicjungle.gg</span></a>
            <a href="https://archive.jurassicjungle.gg/" rel="noopener noreferrer">Archive<span class="host">archive.jurassicjungle.gg</span></a>
        </nav>
    </main>
</body>
</html>
