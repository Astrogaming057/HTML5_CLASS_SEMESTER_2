<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Jurassic Jungle by Astro's Lounge has been discontinued.">
    <title>JurassicJungle | Discontinued · v01</title>
    <style>
        :root { --bg:#0a0c10; --text:#c9d1d9; --dim:#8b949e; --accent:#ff4757; --link:#58a6ff; --border:#30363d; }
        *{box-sizing:border-box} body{margin:0;min-height:100vh;background:var(--bg);color:var(--text);font-family:Segoe UI,Roboto,Helvetica,Arial,sans-serif;display:flex;align-items:center;justify-content:center;padding:40px 20px}
        .wrap{max-width:560px;width:100%;text-align:center}
        .banner{border-bottom:2px solid var(--accent);padding-bottom:22px;margin-bottom:26px}
        .eyebrow{margin:0 0 10px;font-size:.75rem;letter-spacing:.22em;text-transform:uppercase;color:var(--dim)}
        h1{margin:0;font-size:clamp(1.75rem,4.5vw,2.35rem);font-weight:700;letter-spacing:.04em}
        .brand{margin:14px 0 0;font-size:1.15rem;color:var(--accent);font-weight:600}
        .byline{margin:8px 0 0;font-size:.98rem;color:var(--dim);line-height:1.5}
        .msg{margin:22px 0 0;font-size:1.05rem;line-height:1.55}
        .links{margin-top:28px;display:flex;flex-direction:column;gap:12px}
        .links a{display:block;padding:14px 18px;border:1px solid var(--border);border-radius:8px;color:var(--link);text-decoration:none;font-weight:600;font-size:.95rem;transition:.15s}
        .links a:hover{border-color:var(--link);background:rgba(88,166,255,.06)}
        .host{display:block;margin-top:4px;font-weight:400;font-size:.85rem;color:var(--dim);font-family:Cascadia Code,Consolas,monospace}
    </style>
</head>
<body>
    <main class="wrap">
        <header class="banner">
            <p class="eyebrow">Notice</p>
            <h1>Service discontinued</h1>
            <p class="brand">Jurassic Jungle</p>
            <p class="byline">by Astro's Lounge — gaming community</p>
        </header>
        <p class="msg">This service has been discontinued.</p>
        <nav class="links" aria-label="Related sites">
            <a href="https://farewell.jurassicjungle.gg/" rel="noopener noreferrer">Farewell<span class="host">farewell.jurassicjungle.gg</span></a>
            <a href="https://archive.jurassicjungle.gg/" rel="noopener noreferrer">Archive<span class="host">archive.jurassicjungle.gg</span></a>
        </nav>
    </main>
</body>
</html>
