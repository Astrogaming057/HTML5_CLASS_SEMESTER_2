<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Jurassic Jungle by Astro's Lounge has been discontinued.">
    <title>JurassicJungle | Discontinued · v15</title>
    <style>
        *{box-sizing:border-box} body{margin:0;min-height:100vh;background:#08080c;color:#f1f5f9;font-family:Segoe UI,system-ui,sans-serif;display:flex;align-items:center;justify-content:center;padding:40px 20px}
        .wrap{max-width:480px;width:100%;text-align:center}
        .eyebrow{margin:0;font-size:.7rem;letter-spacing:.25em;text-transform:uppercase;color:#64748b}
        h1{margin:12px 0 0;font-size:clamp(1.55rem,4vw,2rem);font-weight:800}
        .brand{margin:18px 0 0;font-size:1.1rem;font-weight:700;background:linear-gradient(90deg,#38bdf8,#a78bfa,#f472b6);-webkit-background-clip:text;background-clip:text;color:transparent}
        .byline{margin:8px 0 0;font-size:.9rem;color:#94a3b8}
        .msg{margin:22px 0 0;font-size:1rem;color:#cbd5e1}
        .links{margin-top:26px;display:flex;flex-direction:column;gap:14px}
        .links a{display:block;padding:16px 22px;border-radius:999px;text-decoration:none;font-weight:700;font-size:.92rem;color:#fff;transition:transform .12s,box-shadow .12s}
        .links a:first-child{background:linear-gradient(135deg,#6366f1,#8b5cf6);box-shadow:0 8px 24px rgba(99,102,241,.35)}
        .links a:last-child{background:linear-gradient(135deg,#0ea5e9,#6366f1);box-shadow:0 8px 24px rgba(14,165,233,.3)}
        .links a:hover{transform:translateY(-2px)}
        .host{display:block;margin-top:6px;font-size:.78rem;font-weight:500;opacity:.85;font-family:ui-monospace,monospace}
    </style>
</head>
<body>
    <main class="wrap">
        <p class="eyebrow">Notice</p>
        <h1>Service discontinued</h1>
        <p class="brand">Jurassic Jungle</p>
        <p class="byline">by Astro's Lounge — gaming community</p>
        <p class="msg">This service has been discontinued.</p>
        <nav class="links" aria-label="Related sites">
            <a href="https://farewell.jurassicjungle.gg/" rel="noopener noreferrer">Farewell<span class="host">farewell.jurassicjungle.gg</span></a>
            <a href="https://archive.jurassicjungle.gg/" rel="noopener noreferrer">Archive<span class="host">archive.jurassicjungle.gg</span></a>
        </nav>
    </main>
</body>
</html>
