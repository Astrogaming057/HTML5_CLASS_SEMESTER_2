<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Jurassic Jungle by Astro's Lounge has been discontinued.">
    <title>JurassicJungle | Discontinued · v04</title>
    <style>
        *{box-sizing:border-box} body{margin:0;min-height:100vh;background:#fafafa;color:#0a0a0a;font-family:Arial,Helvetica,sans-serif;display:flex;align-items:center;justify-content:center;padding:32px 16px}
        .wrap{max-width:640px;width:100%;border:6px solid #0a0a0a;padding:0}
        .inner{padding:36px 28px;border-bottom:6px solid #0a0a0a}
        .eyebrow{margin:0;font-size:.7rem;font-weight:900;letter-spacing:.35em}
        h1{margin:16px 0 0;font-size:clamp(2rem,6vw,3rem);font-weight:900;line-height:1;text-transform:uppercase}
        .brand{margin:24px 0 0;font-size:1.25rem;font-weight:800}
        .byline{margin:8px 0 0;font-size:.95rem;font-weight:600}
        .msg{margin:20px 0 0;font-size:1.05rem;font-weight:700}
        .links{display:grid;grid-template-columns:1fr 1fr;gap:0;border-top:6px solid #0a0a0a}
        .links a{display:flex;flex-direction:column;justify-content:center;min-height:100px;padding:20px;color:#0a0a0a;text-decoration:none;font-weight:800;font-size:.95rem;border-right:6px solid #0a0a0a;transition:.12s}
        .links a:last-child{border-right:none}
        .links a:hover{background:#0a0a0a;color:#fafafa}
        .host{margin-top:8px;font-size:.75rem;font-weight:600;font-family:monospace;word-break:break-all}
        @media(max-width:520px){.links{grid-template-columns:1fr}.links a{border-right:none;border-bottom:6px solid #0a0a0a}.links a:last-child{border-bottom:none}}
    </style>
</head>
<body>
    <main class="wrap">
        <div class="inner">
            <p class="eyebrow">NOTICE</p>
            <h1>Service discontinued</h1>
            <p class="brand">Jurassic Jungle</p>
            <p class="byline">by Astro's Lounge — gaming community</p>
            <p class="msg">This service has been discontinued.</p>
        </div>
        <nav class="links" aria-label="Related sites">
            <a href="https://farewell.jurassicjungle.gg/" rel="noopener noreferrer">Farewell<span class="host">farewell.jurassicjungle.gg</span></a>
            <a href="https://archive.jurassicjungle.gg/" rel="noopener noreferrer">Archive<span class="host">archive.jurassicjungle.gg</span></a>
        </nav>
    </main>
</body>
</html>
