<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Jurassic Jungle by Astro's Lounge has been discontinued.">
    <title>JurassicJungle | Discontinued · v11</title>
    <style>
        *{box-sizing:border-box} body{margin:0;min-height:100vh;background:radial-gradient(ellipse 100% 80% at 50% 100%,#062a32 0%,#021418 55%);color:#d4f4f0;font-family:Segoe UI,system-ui,sans-serif;display:flex;align-items:center;justify-content:center;padding:44px 22px}
        .wrap{max-width:520px;width:100%;text-align:center;padding-bottom:8px;border-bottom:3px solid #2dd4bf}
        .eyebrow{margin:0;font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;color:#5eead4}
        h1{margin:14px 0 0;font-size:clamp(1.6rem,4vw,2.1rem);font-weight:700;color:#ccfbf1}
        .brand{margin:18px 0 0;font-size:1.12rem;font-weight:700;color:#5eead4}
        .byline{margin:6px 0 0;font-size:.92rem;color:#94c9c0}
        .msg{margin:22px 0 0;font-size:1rem;line-height:1.55;color:#b8e6df}
        .links{margin-top:28px;display:flex;flex-direction:column;gap:12px}
        .links a{display:block;padding:14px 18px;border-radius:999px;border:1px solid #134e4a;background:rgba(45,212,191,.08);color:#99f6e4;text-decoration:none;font-weight:600;transition:.15s}
        .links a:hover{background:rgba(45,212,191,.18);border-color:#2dd4bf}
        .host{display:block;margin-top:5px;font-size:.82rem;color:#6fb3a8;font-family:ui-monospace,monospace}
    </style>
</head>
<body>
    <main class="wrap">
        <p class="eyebrow">Notice</p>
        <h1>Service discontinued</h1>
        <p class="brand">Jurassic Jungle</p>
        <p class="byline">by Astro's Lounge — gaming community</p>
        <p class="msg">This service has been discontinued.</p>
        <nav class="links" aria-label="Related sites">
            <a href="https://farewell.jurassicjungle.gg/" rel="noopener noreferrer">Farewell<span class="host">farewell.jurassicjungle.gg</span></a>
            <a href="https://archive.jurassicjungle.gg/" rel="noopener noreferrer">Archive<span class="host">archive.jurassicjungle.gg</span></a>
        </nav>
    </main>
</body>
</html>
