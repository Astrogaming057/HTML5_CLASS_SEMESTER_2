<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Jurassic Jungle by Astro's Lounge has been discontinued.">
    <title>JurassicJungle | Discontinued · v05</title>
    <style>
        *{box-sizing:border-box} body{margin:0;min-height:100vh;background:radial-gradient(80% 60% at 50% -10%,#6b4dff 0%,#1a0d3a 45%,#0b0618 100%);color:#e8e4ff;font-family:Segoe UI,system-ui,sans-serif;display:flex;align-items:center;justify-content:center;padding:40px 20px}
        .wrap{max-width:520px;width:100%;text-align:center;padding:36px 28px;border-radius:20px;background:rgba(12,8,28,.65);backdrop-filter:blur(12px);border:1px solid rgba(180,140,255,.25);box-shadow:0 24px 80px rgba(0,0,0,.45)}
        .eyebrow{margin:0;font-size:.72rem;letter-spacing:.25em;text-transform:uppercase;opacity:.75}
        h1{margin:14px 0 0;font-size:clamp(1.65rem,4vw,2.2rem);font-weight:800;background:linear-gradient(90deg,#fff,#c9b8ff);-webkit-background-clip:text;background-clip:text;color:transparent}
        .brand{margin:18px 0 0;font-size:1.15rem;font-weight:700;color:#c4b5ff}
        .byline{margin:6px 0 0;font-size:.92rem;opacity:.75}
        .msg{margin:22px 0 0;font-size:1rem;line-height:1.5}
        .links{margin-top:26px;display:flex;flex-direction:column;gap:11px}
        .links a{display:block;padding:14px 16px;border-radius:12px;background:rgba(107,77,255,.2);border:1px solid rgba(200,180,255,.35);color:#e4dcff;text-decoration:none;font-weight:600;transition:.15s}
        .links a:hover{background:rgba(107,77,255,.4)}
        .host{display:block;margin-top:5px;font-size:.82rem;opacity:.65;font-family:ui-monospace,monospace}
    </style>
</head>
<body>
    <main class="wrap">
        <p class="eyebrow">Notice</p>
        <h1>Service discontinued</h1>
        <p class="brand">Jurassic Jungle</p>
        <p class="byline">by Astro's Lounge — gaming community</p>
        <p class="msg">This service has been discontinued.</p>
        <nav class="links" aria-label="Related sites">
            <a href="https://farewell.jurassicjungle.gg/" rel="noopener noreferrer">Farewell<span class="host">farewell.jurassicjungle.gg</span></a>
            <a href="https://archive.jurassicjungle.gg/" rel="noopener noreferrer">Archive<span class="host">archive.jurassicjungle.gg</span></a>
        </nav>
    </main>
</body>
</html>
