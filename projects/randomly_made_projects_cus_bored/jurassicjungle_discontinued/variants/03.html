<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Jurassic Jungle by Astro's Lounge has been discontinued.">
    <title>JurassicJungle | Discontinued · v03</title>
    <style>
        :root { --bg:#1a0f08; --text:#f4e8d8; --dim:#a67c52; --accent:#ff9f43; --link:#ffd38a; --border:#5c3d24; }
        *{box-sizing:border-box} body{margin:0;min-height:100vh;background:linear-gradient(180deg,#2d1810 0%,var(--bg) 45%,#0f0805 100%);color:var(--text);font-family:Georgia,"Times New Roman",serif;display:flex;align-items:center;justify-content:center;padding:40px 20px}
        .wrap{max-width:520px;width:100%;text-align:center;padding:32px 28px;border-radius:16px;background:linear-gradient(145deg,rgba(255,159,67,.12),transparent);border:1px solid var(--border)}
        .eyebrow{margin:0;font-size:.72rem;letter-spacing:.28em;text-transform:uppercase;color:var(--dim)}
        h1{margin:12px 0 0;font-size:clamp(1.6rem,4vw,2.1rem);font-weight:400;font-style:italic;color:var(--accent)}
        .brand{margin:18px 0 0;font-size:1.2rem;font-weight:700;font-style:normal;color:var(--text)}
        .byline{margin:8px 0 0;font-size:.95rem;color:var(--dim);font-family:Segoe UI,sans-serif}
        .msg{margin:22px 0 0;font-size:1rem;font-family:Segoe UI,sans-serif;opacity:.95}
        .links{margin-top:26px;display:flex;flex-direction:column;gap:12px;font-family:Segoe UI,sans-serif}
        .links a{display:block;padding:14px;border-radius:10px;background:rgba(255,159,67,.1);border:1px solid var(--border);color:var(--link);text-decoration:none;font-weight:600;transition:.15s}
        .links a:hover{background:rgba(255,159,67,.2)}
        .host{display:block;margin-top:5px;font-size:.82rem;font-weight:400;color:var(--dim)}
    </style>
</head>
<body>
    <main class="wrap">
        <p class="eyebrow">Notice</p>
        <h1>Service discontinued</h1>
        <p class="brand">Jurassic Jungle</p>
        <p class="byline">by Astro's Lounge — gaming community</p>
        <p class="msg">This service has been discontinued.</p>
        <nav class="links" aria-label="Related sites">
            <a href="https://farewell.jurassicjungle.gg/" rel="noopener noreferrer">Farewell<span class="host">farewell.jurassicjungle.gg</span></a>
            <a href="https://archive.jurassicjungle.gg/" rel="noopener noreferrer">Archive<span class="host">archive.jurassicjungle.gg</span></a>
        </nav>
    </main>
</body>
</html>
