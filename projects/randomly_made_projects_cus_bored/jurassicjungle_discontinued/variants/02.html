<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Jurassic Jungle by Astro's Lounge has been discontinued.">
    <title>JurassicJungle | Discontinued · v02</title>
    <style>
        :root { --bg:#020805; --text:#b4f5c8; --dim:#3d6b4f; --accent:#39ff14; --link:#7fff7f; --border:#1a3d28; }
        *{box-sizing:border-box} body{margin:0;min-height:100vh;background:radial-gradient(ellipse at 50% 0%,#0d1f14 0%,var(--bg) 55%);color:var(--text);font-family:Consolas,"Courier New",monospace;display:flex;align-items:center;justify-content:center;padding:40px 20px}
        .wrap{max-width:620px;width:100%;text-align:left;border:1px solid var(--border);border-radius:4px;padding:28px 24px;box-shadow:0 0 40px rgba(57,255,20,.08)}
        .prompt{color:var(--accent);font-size:.75rem;letter-spacing:.15em;margin:0 0 12px}
        h1{margin:0;font-size:1.35rem;font-weight:700;color:var(--accent);text-shadow:0 0 12px rgba(57,255,20,.35)}
        .brand{margin:16px 0 0;font-size:1rem;color:var(--text)}
        .byline{margin:6px 0 0;font-size:.85rem;color:var(--dim)}
        .msg{margin:20px 0 0;font-size:.9rem;border-left:3px solid var(--accent);padding-left:14px}
        .links{margin-top:22px;display:flex;flex-direction:column;gap:10px}
        .links a{display:block;padding:10px 14px;border:1px dashed var(--border);color:var(--link);text-decoration:none;font-size:.88rem;transition:.15s}
        .links a:hover{border-style:solid;background:rgba(57,255,20,.06)}
        .host{display:block;margin-top:4px;font-size:.78rem;color:var(--dim)}
    </style>
</head>
<body>
    <main class="wrap">
        <p class="prompt">&gt; SYS.NOTICE // END_OF_SERVICE</p>
        <h1>Service discontinued</h1>
        <p class="brand">Jurassic Jungle</p>
        <p class="byline">by Astro's Lounge — gaming community</p>
        <p class="msg">This service has been discontinued.</p>
        <nav class="links" aria-label="Related sites">
            <a href="https://farewell.jurassicjungle.gg/" rel="noopener noreferrer">[01] Farewell<span class="host">farewell.jurassicjungle.gg</span></a>
            <a href="https://archive.jurassicjungle.gg/" rel="noopener noreferrer">[02] Archive<span class="host">archive.jurassicjungle.gg</span></a>
        </nav>
    </main>
</body>
</html>
