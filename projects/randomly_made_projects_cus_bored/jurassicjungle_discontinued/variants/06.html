<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Jurassic Jungle by Astro's Lounge has been discontinued.">
    <title>JurassicJungle | Discontinued · v06</title>
    <style>
        *{box-sizing:border-box} body{margin:0;min-height:100vh;background:#f6f1e7;color:#1c1b19;font-family:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;display:flex;align-items:center;justify-content:center;padding:48px 24px}
        .wrap{max-width:480px;width:100%;text-align:center;padding:40px 32px;background:#fffdf8;border:1px solid #d9d0c3;box-shadow:0 2px 0 #c4b8a5,0 12px 40px rgba(0,0,0,.06)}
        .rule{width:48px;height:3px;background:#c45c3e;margin:0 auto 20px}
        .eyebrow{margin:0;font-size:.68rem;letter-spacing:.2em;text-transform:uppercase;color:#7a6f63;font-family:Segoe UI,sans-serif}
        h1{margin:14px 0 0;font-size:clamp(1.5rem,3.8vw,1.95rem);font-weight:600;color:#2c2824}
        .brand{margin:18px 0 0;font-size:1.1rem;font-weight:700;color:#8b3a2f;font-family:Segoe UI,sans-serif}
        .byline{margin:8px 0 0;font-size:.92rem;color:#5c5348;font-family:Segoe UI,sans-serif}
        .msg{margin:22px 0 0;font-size:.98rem;line-height:1.6;font-family:Segoe UI,sans-serif;color:#3d3830}
        .links{margin-top:28px;display:flex;flex-direction:column;gap:10px;font-family:Segoe UI,sans-serif}
        .links a{display:block;padding:12px 16px;border:1px solid #c4b8a5;border-radius:4px;color:#1a4d7a;text-decoration:none;font-weight:600;font-size:.9rem;transition:.12s}
        .links a:hover{background:#f0ebe3}
        .host{display:block;margin-top:4px;font-size:.78rem;color:#6b6258;font-weight:500}
    </style>
</head>
<body>
    <main class="wrap">
        <div class="rule" aria-hidden="true"></div>
        <p class="eyebrow">Notice</p>
        <h1>Service discontinued</h1>
        <p class="brand">Jurassic Jungle</p>
        <p class="byline">by Astro's Lounge — gaming community</p>
        <p class="msg">This service has been discontinued.</p>
        <nav class="links" aria-label="Related sites">
            <a href="https://farewell.jurassicjungle.gg/" rel="noopener noreferrer">Farewell<span class="host">farewell.jurassicjungle.gg</span></a>
            <a href="https://archive.jurassicjungle.gg/" rel="noopener noreferrer">Archive<span class="host">archive.jurassicjungle.gg</span></a>
        </nav>
    </main>
</body>
</html>
