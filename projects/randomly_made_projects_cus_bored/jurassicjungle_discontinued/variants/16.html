<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Jurassic Jungle by Astro's Lounge has been discontinued.">
    <title>JurassicJungle | Discontinued · v16</title>
    <style>
        *{box-sizing:border-box} body{margin:0;min-height:100vh;background:#0a0a0b;color:#faf7f0;font-family:Segoe UI,system-ui,sans-serif;display:flex;align-items:center;justify-content:center;padding:48px 24px}
        .wrap{max-width:560px;width:100%;text-align:center;padding:40px 32px;border:1px solid #3d3428;background:linear-gradient(165deg,#141210,#0a0908);box-shadow:0 24px 60px rgba(0,0,0,.55),inset 0 1px 0 rgba(212,175,55,.12)}
        .rule{height:1px;background:linear-gradient(90deg,transparent,#c9a227,transparent);margin:0 auto 24px;max-width:200px}
        .eyebrow{margin:0;font-size:.65rem;letter-spacing:.35em;text-transform:uppercase;color:#a89878}
        h1{margin:14px 0 0;font-size:clamp(1.5rem,3.8vw,1.95rem);font-weight:600;color:#f5edd6}
        .brand{margin:22px 0 0;font-size:1.2rem;font-weight:700;background:linear-gradient(90deg,#e8d5a3,#c9a227,#e8d5a3);-webkit-background-clip:text;background-clip:text;color:transparent}
        .byline{margin:8px 0 0;font-size:.92rem;color:#9a8b70}
        .msg{margin:24px 0 0;font-size:1rem;color:#d4c9b4;line-height:1.6}
        .links{margin-top:28px;display:flex;flex-direction:column;gap:12px}
        .links a{display:block;padding:14px 18px;border:1px solid #5c4f3a;border-radius:8px;color:#e8d5a3;text-decoration:none;font-weight:600;transition:.15s;background:rgba(201,162,39,.06)}
        .links a:hover{border-color:#c9a227;background:rgba(201,162,39,.12)}
        .host{display:block;margin-top:5px;font-size:.82rem;color:#8a7b62;font-family:Consolas,monospace}
    </style>
</head>
<body>
    <main class="wrap">
        <div class="rule" aria-hidden="true"></div>
        <p class="eyebrow">Notice</p>
        <h1>Service discontinued</h1>
        <p class="brand">Jurassic Jungle</p>
        <p class="byline">by Astro's Lounge — gaming community</p>
        <p class="msg">This service has been discontinued.</p>
        <nav class="links" aria-label="Related sites">
            <a href="https://farewell.jurassicjungle.gg/" rel="noopener noreferrer">Farewell<span class="host">farewell.jurassicjungle.gg</span></a>
            <a href="https://archive.jurassicjungle.gg/" rel="noopener noreferrer">Archive<span class="host">archive.jurassicjungle.gg</span></a>
        </nav>
    </main>
</body>
</html>
