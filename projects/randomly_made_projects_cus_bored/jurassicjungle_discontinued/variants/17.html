<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Jurassic Jungle by Astro's Lounge has been discontinued.">
    <title>JurassicJungle | Discontinued · v17</title>
    <style>
        *{box-sizing:border-box} body{margin:0;min-height:100vh;background:#0f1812;color:#e8f0e6;font-family:Segoe UI,system-ui,sans-serif;display:flex;align-items:center;justify-content:center;padding:40px 20px}
        .wrap{max-width:520px;width:100%;text-align:center;padding:32px 26px;border-radius:16px;background:linear-gradient(180deg,rgba(52,120,75,.25) 0%,rgba(15,24,18,.95) 40%);border:1px solid #2a4a38;box-shadow:inset 0 0 0 1px rgba(120,180,140,.08)}
        .leaf{margin:0 auto 16px;width:40px;height:8px;border-radius:4px;background:#4ade80;opacity:.6;transform:rotate(-8deg)}
        .eyebrow{margin:0;font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:#86b89a}
        h1{margin:10px 0 0;font-size:clamp(1.55rem,4vw,2.05rem);font-weight:700;color:#ecfdf5}
        .brand{margin:16px 0 0;font-size:1.1rem;font-weight:700;color:#4ade80}
        .byline{margin:6px 0 0;font-size:.9rem;color:#a3c4b0}
        .msg{margin:20px 0 0;font-size:1rem;line-height:1.55;color:#d1e0d6}
        .links{margin-top:24px;display:flex;flex-direction:column;gap:11px}
        .links a{display:block;padding:13px 16px;border-radius:10px;border:1px solid #2f5c44;background:#14231a;color:#b8f5c8;text-decoration:none;font-weight:600;transition:.15s}
        .links a:hover{background:#1a3024;border-color:#4ade80}
        .host{display:block;margin-top:5px;font-size:.8rem;color:#7d9e88;font-family:ui-monospace,monospace}
    </style>
</head>
<body>
    <main class="wrap">
        <div class="leaf" aria-hidden="true"></div>
        <p class="eyebrow">Notice</p>
        <h1>Service discontinued</h1>
        <p class="brand">Jurassic Jungle</p>
        <p class="byline">by Astro's Lounge — gaming community</p>
        <p class="msg">This service has been discontinued.</p>
        <nav class="links" aria-label="Related sites">
            <a href="https://farewell.jurassicjungle.gg/" rel="noopener noreferrer">Farewell<span class="host">farewell.jurassicjungle.gg</span></a>
            <a href="https://archive.jurassicjungle.gg/" rel="noopener noreferrer">Archive<span class="host">archive.jurassicjungle.gg</span></a>
        </nav>
    </main>
</body>
</html>
