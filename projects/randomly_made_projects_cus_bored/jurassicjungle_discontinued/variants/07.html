<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Jurassic Jungle by Astro's Lounge has been discontinued.">
    <title>JurassicJungle | Discontinued · v07</title>
    <style>
        *{box-sizing:border-box} body{margin:0;min-height:100vh;background:#050510;color:#e0fbff;font-family:"Segoe UI",system-ui,sans-serif;display:flex;align-items:center;justify-content:center;padding:40px 20px}
        .wrap{max-width:560px;width:100%;position:relative;padding:36px 28px;text-align:center;border:1px solid #00f5ff;box-shadow:0 0 24px rgba(0,245,255,.25),inset 0 0 60px rgba(255,0,180,.05);background:linear-gradient(180deg,rgba(255,0,180,.06),transparent)}
        .wrap::before{content:"";position:absolute;inset:-1px;border:1px solid rgba(255,0,180,.4);pointer-events:none;opacity:.5}
        .eyebrow{margin:0;font-size:.68rem;letter-spacing:.4em;color:#ff4fd8;text-shadow:0 0 8px #ff4fd8}
        h1{margin:14px 0 0;font-size:clamp(1.7rem,4.2vw,2.3rem);font-weight:800;text-transform:uppercase;color:#00f5ff;text-shadow:0 0 20px rgba(0,245,255,.5)}
        .brand{margin:16px 0 0;font-size:1.1rem;color:#fff;font-weight:700}
        .byline{margin:6px 0 0;font-size:.88rem;color:#8899aa}
        .msg{margin:20px 0 0;font-size:1rem;color:#c8dce3}
        .links{margin-top:24px;display:flex;flex-direction:column;gap:11px}
        .links a{display:block;padding:13px 16px;border:1px solid #00f5ff;color:#9ffcff;text-decoration:none;font-weight:700;font-size:.88rem;letter-spacing:.06em;transition:.15s;clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px)}
        .links a:hover{background:rgba(0,245,255,.12);box-shadow:0 0 16px rgba(0,245,255,.3)}
        .host{display:block;margin-top:5px;font-size:.78rem;font-weight:500;color:#6a8a94;font-family:Consolas,monospace}
    </style>
</head>
<body>
    <main class="wrap">
        <p class="eyebrow">NOTICE</p>
        <h1>Service discontinued</h1>
        <p class="brand">Jurassic Jungle</p>
        <p class="byline">by Astro's Lounge — gaming community</p>
        <p class="msg">This service has been discontinued.</p>
        <nav class="links" aria-label="Related sites">
            <a href="https://farewell.jurassicjungle.gg/" rel="noopener noreferrer">FAREWELL<span class="host">farewell.jurassicjungle.gg</span></a>
            <a href="https://archive.jurassicjungle.gg/" rel="noopener noreferrer">ARCHIVE<span class="host">archive.jurassicjungle.gg</span></a>
        </nav>
    </main>
</body>
</html>
