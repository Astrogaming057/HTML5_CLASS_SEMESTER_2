<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Jurassic Jungle by Astro's Lounge has been discontinued.">
    <title>JurassicJungle | Discontinued · v12</title>
    <style>
        *{box-sizing:border-box} body{margin:0;min-height:100vh;background:#0c0406;color:#f5e6e8;font-family:Georgia,"Times New Roman",serif;display:flex;align-items:center;justify-content:center;padding:40px 20px}
        .wrap{max-width:520px;width:100%;text-align:center;padding:32px 26px;border:1px solid #5c1620;background:radial-gradient(120% 80% at 50% 0%,#2a0a10 0%,#0c0406 55%);box-shadow:0 0 0 1px rgba(180,40,60,.3)}
        .eyebrow{margin:0;font-family:Segoe UI,sans-serif;font-size:.68rem;letter-spacing:.35em;text-transform:uppercase;color:#c45c6a}
        h1{margin:14px 0 0;font-size:clamp(1.75rem,4.5vw,2.35rem);font-weight:400;font-style:italic;color:#ff6b7a}
        .brand{margin:18px 0 0;font-size:1.15rem;font-weight:700;font-style:normal;color:#fff}
        .byline{margin:8px 0 0;font-size:.92rem;font-family:Segoe UI,sans-serif;color:#a89094}
        .msg{margin:22px 0 0;font-size:1rem;font-family:Segoe UI,sans-serif;color:#dcc8cc;line-height:1.55}
        .links{margin-top:26px;display:flex;flex-direction:column;gap:11px;font-family:Segoe UI,sans-serif}
        .links a{display:block;padding:13px 16px;border:1px solid #5c1620;border-radius:6px;color:#ffb3bd;text-decoration:none;font-weight:600;transition:.15s}
        .links a:hover{background:rgba(92,22,32,.5);border-color:#a61f32}
        .host{display:block;margin-top:5px;font-size:.8rem;color:#8a7075;font-family:Consolas,monospace}
    </style>
</head>
<body>
    <main class="wrap">
        <p class="eyebrow">Notice</p>
        <h1>Service discontinued</h1>
        <p class="brand">Jurassic Jungle</p>
        <p class="byline">by Astro's Lounge — gaming community</p>
        <p class="msg">This service has been discontinued.</p>
        <nav class="links" aria-label="Related sites">
            <a href="https://farewell.jurassicjungle.gg/" rel="noopener noreferrer">Farewell<span class="host">farewell.jurassicjungle.gg</span></a>
            <a href="https://archive.jurassicjungle.gg/" rel="noopener noreferrer">Archive<span class="host">archive.jurassicjungle.gg</span></a>
        </nav>
    </main>
</body>
</html>
