<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Jurassic Jungle</title>
    <link rel="stylesheet" href="styles-min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="stars"></div>
    <div class="stars2"></div>
    <div class="stars3"></div>
    
    <div class="error-container">
        <div class="container">
            <div class="error-content">
                <h1 class="error-code">404</h1>
                <h2 class="error-title">This Page Has Gone Extinct</h2>
                <p class="error-message">
                    The page you're looking for has disappeared into the prehistoric past. 
                    It may have been moved, deleted, or never existed.
                </p>
                <div class="error-actions">
                    <a href="/" class="error-link primary">Return Home</a>
                    <a href="https://jurassicjungle.gg" class="error-link secondary">Main Site</a>
                </div>
                <div class="error-dino">🦖</div>
            </div>
        </div>
    </div>

    <style>
        .error-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            position: relative;
            z-index: 1;
        }

        .error-content {
            text-align: center;
            max-width: 700px;
            margin: 0 auto;
            animation: fadeInUp 1s ease 0.3s backwards;
        }

        .error-code {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(8rem, 20vw, 12rem);
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            text-shadow: 0 0 50px rgba(255, 107, 107, 0.5);
            animation: glow 2s ease-in-out infinite alternate;
            line-height: 1;
        }

        .error-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2rem, 5vw, 3.5rem);
            color: var(--text-light);
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 3px;
            animation: fadeInUp 1s ease 0.5s backwards;
        }

        .error-message {
            font-size: 1.3rem;
            line-height: 1.8;
            color: var(--text-light);
            margin-bottom: 50px;
            opacity: 0.9;
            animation: fadeInUp 1s ease 0.7s backwards;
        }

        .error-actions {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 40px;
            animation: fadeInUp 1s ease 0.9s backwards;
        }

        .error-link {
            display: inline-block;
            padding: 18px 45px;
            border-radius: 12px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .error-link.primary {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border: 2px solid var(--primary-color);
            color: var(--bg-darker);
            box-shadow: 0 8px 32px rgba(0, 255, 136, 0.3);
        }

        .error-link.primary:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 12px 40px rgba(0, 255, 136, 0.5);
        }

        .error-link.secondary {
            background: var(--card-bg);
            border: 2px solid var(--card-border);
            color: var(--text-light);
            box-shadow: 0 8px 32px rgba(0, 255, 136, 0.1);
        }

        .error-link.secondary:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(0, 255, 136, 0.3);
            border-color: var(--primary-color);
        }

        .error-dino {
            font-size: 8rem;
            animation: float 3s ease-in-out infinite, fadeIn 1s ease 1.1s backwards;
            filter: drop-shadow(0 0 20px rgba(255, 107, 107, 0.5));
            opacity: 0.7;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-20px) rotate(-5deg); }
            75% { transform: translateY(-10px) rotate(5deg); }
        }

        @media (max-width: 768px) {
            .error-code {
                font-size: 6rem;
            }

            .error-title {
                font-size: 1.8rem;
            }

            .error-message {
                font-size: 1.1rem;
            }

            .error-link {
                padding: 15px 35px;
                font-size: 1rem;
            }

            .error-dino {
                font-size: 5rem;
            }
        }
    </style>
</body>
</html>
